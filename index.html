<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia — C.E. Cantón El Ojusthe - 80045</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root {
    --blue-800: #0C447C; --blue-600: #185FA5; --blue-50: #E6F1FB;
    --green-600: #1D9E75; --green-50: #EAF3DE;
    --red-600: #E24B4A; --red-50: #FCEBEB;
    --gray-900: #2C2C2A; --gray-600: #5F5E5A; --gray-100: #D3D1C7; --gray-50: #F0F2F5;
    --amber-600: #BA7517;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background-color: var(--gray-50); color: var(--gray-900); padding-bottom: 50px; }

  /* HEADER */
  .header { background-color: var(--blue-800); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
  .header-logo { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 50%; padding: 5px; }
  .header-titles { flex: 1; text-align: center; }
  .header h1 { font-size: 18px; margin-bottom: 2px; }
  
  .btn-group-nav { display: flex; gap: 8px; flex-direction: column; }
  .btn-nav { color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }

  .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
  .panel { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  
  .view-section { display: none; }
  .view-active { display: block; }

  /* FILTROS Y TABLAS */
  .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  label { font-weight: bold; font-size: 12px; color: var(--gray-600); display: block; margin-bottom: 5px; text-transform: uppercase; }
  select, input[type="text"] { width: 100%; padding: 10px; border: 1.5px solid var(--gray-100); border-radius: 8px; font-size: 14px; outline: none; }
  
  .student-list { margin-top: 10px; border: 1px solid var(--gray-100); border-radius: 8px; overflow: hidden; }
  .student-row { display: grid; grid-template-columns: 40px 2fr 1fr 1fr 1fr; gap: 10px; padding: 12px 15px; border-bottom: 1px solid var(--gray-100); align-items: center; cursor: pointer; transition: background 0.2s; }
  .student-row:hover { background-color: var(--blue-50); }
  .student-header { background-color: var(--blue-800); color: white; font-weight: bold; font-size: 12px; cursor: default; }
  
  input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--green-600); }
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-align: center; }
  .badge.m { background-color: var(--blue-50); color: var(--blue-800); }
  .badge.f { background-color: #FDE8EF; color: #9D234C; }

  .btn-action { font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid var(--gray-100); background: white; }
  
  .btn-generate { background-color: var(--green-600); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; margin-bottom: 10px;}
  .btn-generate:disabled { background-color: var(--gray-400); cursor: not-allowed; }

  .sub-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  .sub-table th, .sub-table td { padding: 10px; border: 1px solid var(--gray-100); text-align: left; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }

  /* LOGO CENTRADO WEB */
  .web-logo-container { text-align: center; margin: 20px 0; }
  .web-logo { width: 250px; height: auto; display: inline-block; }

  #pdf-container { display: none; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.jpg" alt="Logo" class="header-logo" onerror="this.style.display='none'"> 
  <div class="header-titles">
    <h1>Sistema de Control de Asistencia</h1>
    <p>Centro Escolar Cantón El Ojusthe - 80045</p>
  </div>
  <div class="btn-group-nav">
    <button class="btn-nav" style="background:#BA7517" onclick="pedirPasswordNuevo()">➕ Nuevo Alumno</button>
    <button class="btn-nav" style="background:var(--green-600)" onclick="pedirPasswordSub()">📊 Sub-Dirección</button>
    <button class="btn-nav" style="background:var(--blue-600); display:none;" id="btn-volver-asist" onclick="cambiarVista('docente')">✍️ Pasar Lista</button>
  </div>
</div>

<div class="container">
  
  <div id="view-docente" class="view-section view-active">
    <div class="panel">
      <div class="filters">
        <div>
          <label>Grado</label>
          <select id="grado-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value="7° Grado">7° Grado</option>
            <option value="8° Grado">8° Grado</option>
            <option value="9° Grado">9° Grado</option>
          </select>
        </div>
        <div>
          <label>Sección</label>
          <select id="seccion-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value='"A"'>"A"</option>
            <option value='"B"'>"B"</option>
            <option value="Única">Única</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
        <label style="color: var(--blue-800); margin:0; font-size:16px;">Lista de Estudiantes</label>
        <div>
          <button class="btn-action" onclick="toggleTodos()">☑️ Marcar/Desmarcar Todos</button>
          <button onclick="inicializarBaseDatos()" style="background:none; border:none; color:var(--blue-600); cursor:pointer; font-size:12px; font-weight:bold; margin-left: 10px;">🔄 Nube</button>
        </div>
      </div>
      <div class="student-list" id="tabla-alumnos">
        <div style="padding: 20px; text-align: center; color: var(--gray-600);">Elija grado y sección para cargar lista.</div>
      </div>
    </div>

    <div class="panel">
      <div class="web-logo-container">
        <img src="logo2.svg" alt="Logo Institucional" class="web-logo" onerror="this.src='logo2.jpg'; this.onerror=null;">
      </div>

      <label>Nombre del Docente Responsable:</label>
      <input type="text" id="docente-nombre" placeholder="Nombre completo del docente" style="margin-bottom: 15px;">
      
      <div style="background: var(--gray-50); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--gray-100);">
        <label style="color: var(--green-600);">Diseño de Reporte Profesional</label>
        <div style="display:flex; gap:20px; margin-bottom: 15px; font-size:14px;">
          <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="portrait" checked> Vertical</label>
          <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="landscape"> Horizontal</label>
        </div>
        <button class="btn-generate" id="btn-pdf-generate" onclick="generarPDF()">📥 Generar Reporte PDF y Guardar en Nube</button>
      </div>
    </div>
  </div>

  <div id="view-subdireccion" class="view-section">
    <div class="panel">
      <h2 style="color: var(--blue-800); margin-bottom: 10px;">Resumen (Sub-Dirección)</h2>
      <div id="sub-lista-reportes">
        <div style="padding: 20px; text-align: center;">Cargando reportes...</div>
      </div>
      <button onclick="cargarReportesSub()" style="width:100%; margin-top:15px; padding:12px; border-radius:8px; border:1px solid var(--blue-600); color:var(--blue-600); background:white; font-weight:bold; cursor:pointer;">🔄 Actualizar Lista</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-alumno">
  <div class="modal">
    <h3>Nuevo Estudiante</h3>
    <input type="text" id="new-nombre" placeholder="Apellidos, Nombres" style="width:100%; padding:10px; margin-bottom:10px;">
    <select id="new-sexo" style="width:100%; padding:10px; margin-bottom:10px;"><option value="M">Masculino (M)</option><option value="F">Femenino (F)</option></select>
    <input type="text" id="new-nie" placeholder="NIE" style="width:100%; padding:10px; margin-bottom:10px;">
    <div style="display:flex; gap:10px;">
      <button onclick="cerrarModal()" style="flex:1; padding:10px;">Cancelar</button>
      <button onclick="guardarAlumno()" id="btn-save-cloud" style="flex:1; padding:10px; background:var(--blue-600); color:white; border:none; border-radius:6px;">Guardar</button>
    </div>
  </div>
</div>

<div id="pdf-container">
  <div id="pdf-content" style="background: white; width: 100%; position: relative;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1OXGzPg4d0gQWTBxSyzDSi8_dVf8X7j3-bFcVK5EvoE0Auwj69KGUq2ZAU3r3Sofuxg/exec";

let baseDatosAlumnos = [];
let alumnosFiltrados = [];
let estadoSeleccion = true;

// --- NAVEGACIÓN ---
function pedirPasswordSub() { if (prompt("Contraseña Sub-Dirección:") === "1234") cambiarVista('subdireccion'); }
function pedirPasswordNuevo() { if (prompt("Contraseña Administrador:") === "1234") document.getElementById('modal-alumno').classList.add('open'); }

function cambiarVista(vista) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
    if(vista === 'subdireccion') {
        document.getElementById('view-subdireccion').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'block';
        cargarReportesSub();
    } else {
        document.getElementById('view-docente').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'none';
    }
}

// --- DATOS ---
async function inicializarBaseDatos() {
  const cont = document.getElementById('tabla-alumnos');
  try {
    const response = await fetch(SCRIPT_URL);
    baseDatosAlumnos = await response.json();
    baseDatosAlumnos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    cargarAlumnos();
  } catch (error) { cont.innerHTML = '<div style="color:red;">Error de conexión.</div>'; }
}
window.onload = inicializarBaseDatos;

async function cargarReportesSub() {
    const container = document.getElementById('sub-lista-reportes');
    container.innerHTML = "Sincronizando...";
    try {
        const response = await fetch(SCRIPT_URL + "?tipo=reportes");
        const reportes = await response.json();
        let html = `<table class="sub-table"><tr style="background-color: var(--blue-800); color: white;"><th>Fecha</th><th>Grado/Secc</th><th>Docente</th><th>M</th><th>F</th><th>Aus</th><th>Total</th></tr>`;
        reportes.reverse().slice(0, 15).forEach(r => {
            html += `<tr><td>${new Date(r.fecha).toLocaleDateString()}</td><td>${r.grado} ${r.seccion}</td><td>${r.docente}</td><td>${r.m}</td><td>${r.f}</td><td>${r.ausentes}</td><td>${r.presentes}</td></tr>`;
        });
        container.innerHTML = html + "</table>";
    } catch (e) { container.innerHTML = "Error al cargar reportes."; }
}

function cargarAlumnos() {
  const grado = document.getElementById('grado-select').value;
  const seccion = document.getElementById('seccion-select').value;
  const contenedor = document.getElementById('tabla-alumnos');
  if (!grado || !seccion) return;
  alumnosFiltrados = baseDatosAlumnos.filter(a => a.grado === grado && a.seccion === seccion);
  let html = `<div class="student-row student-header"><div>✓</div><div>Nombre del Estudiante</div><div>Sexo</div><div>NIE</div><div>Tel</div></div>`;
  alumnosFiltrados.forEach((alumno, index) => {
    html += `<div class="student-row" onclick="document.getElementById('chk-${index}').checked = !document.getElementById('chk-${index}').checked">
        <div class="checkbox-wrapper"><input type="checkbox" id="chk-${index}" checked onclick="event.stopPropagation()"></div>
        <div style="font-size:13px; font-weight:500;">${alumno.nombre}</div>
        <div><span class="badge ${alumno.sexo.toLowerCase()}">${alumno.sexo}</span></div>
        <div style="font-size:12px;">${alumno.nie}</div>
        <div style="font-size:12px;">${alumno.telefono || 'N/A'}</div>
      </div>`;
  });
  contenedor.innerHTML = html;
}

function toggleTodos() {
  estadoSeleccion = !estadoSeleccion;
  alumnosFiltrados.forEach((a, i) => document.getElementById(`chk-${i}`).checked = estadoSeleccion);
}

// --- GENERADOR DE PDF PRO ---
async function generarPDF() {
  const docente = document.getElementById('docente-nombre').value.trim();
  const grado = document.getElementById('grado-select').value;
  const seccion = document.getElementById('seccion-select').value;
  const orientacion = document.querySelector('input[name="orientacion"]:checked').value;
  const btn = document.getElementById('btn-pdf-generate');

  if (!grado || !seccion || !docente) { alert("Complete Grado, Sección y nombre del Docente."); return; }

  btn.disabled = true; btn.innerText = "⏳ Generando...";

  const presentes = [], ausentes = []; let masc = 0, fem = 0;
  alumnosFiltrados.forEach((alumno, index) => {
    if (document.getElementById(`chk-${index}`).checked) {
      presentes.push(alumno); alumno.sexo === 'M' ? masc++ : fem++;
    } else { ausentes.push(alumno); }
  });

  const fecha = new Date().toLocaleDateString('es-ES');

  // DISEÑO DEL CONTENIDO DEL PDF
  const pdfHtml = `
    <div style="padding: 40px; font-family: Arial, sans-serif;">
        <div style="text-align: center; margin-top: 150px; margin-bottom: 300px;">
            <h1 style="color: #0C447C; font-size: 28px; margin-bottom: 10px;">MINISTERIO DE EDUCACIÓN, CIENCIA Y TECNOLOGÍA</h1>
            <h2 style="color: #333; font-size: 22px; margin-bottom: 60px;">CENTRO ESCOLAR CANTÓN EL OJUSTHE - 80045</h2>
            
            <div style="border: 2px solid #0C447C; padding: 40px; border-radius: 15px; width: 85%; margin: 0 auto;">
                <h3 style="font-size: 24px; color: #185FA5; margin-bottom: 30px; border-bottom: 2px solid #185FA5; padding-bottom: 10px;">REGISTRO DE ASISTENCIA DIARIO</h3>
                <div style="text-align: left; font-size: 18px; line-height: 2;">
                    <p><strong>Grado:</strong> ${grado} &nbsp;&nbsp;&nbsp; <strong>Sección:</strong> ${seccion}</p>
                    <p><strong>Docente Responsable:</strong> ${docente}</p>
                    <p><strong>Fecha:</strong> ${fecha}</p>
                </div>
            </div>
        </div>

        <div class="html2pdf__page-break"></div>

        <div style="border-bottom: 3px solid #0C447C; padding-bottom: 10px; margin-bottom: 20px; text-align: center;">
            <h2 style="font-size: 18px; color: #0C447C;">REPORTE DETALLADO DE ASISTENCIA</h2>
        </div>

        <div style="background: #f1f1f1; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 14px;">
            <span><strong>Total Asistencias:</strong> ${presentes.length} (M: ${masc} | F: ${fem})</span>
            <span><strong>Total Ausencias:</strong> ${ausentes.length}</span>
        </div>

        <h4 style="color: #1D9E75; border-bottom: 2px solid #1D9E75; padding-bottom: 5px; margin-bottom: 10px;">ESTUDIANTES PRESENTES</h4>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 12px;">
            <thead><tr style="background: #eee;">
                <th style="border: 1px solid #ddd; padding: 8px; width: 10%;">✓</th>
                <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">NOMBRE COMPLETO</th>
                <th style="border: 1px solid #ddd; padding: 8px; width: 10%;">SEXO</th>
                <th style="border: 1px solid #ddd; padding: 8px; width: 20%;">NIE</th>
            </tr></thead>
            <tbody>
                ${presentes.map(a => `<tr><td style="border: 1px solid #ddd; padding: 6px; text-align: center; color: green;">PRESENTE</td><td style="border: 1px solid #ddd; padding: 6px;">${a.nombre}</td><td style="border: 1px solid #ddd; padding: 6px; text-align: center;">${a.sexo}</td><td style="border: 1px solid #ddd; padding: 6px; text-align: center;">${a.nie}</td></tr>`).join('')}
            </tbody>
        </table>

        <h4 style="color: #E24B4A; border-bottom: 2px solid #E24B4A; padding-bottom: 5px; margin-bottom: 10px;">ESTUDIANTES AUSENTES</h4>
        <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
            <tbody>
                ${ausentes.length > 0 ? ausentes.map(a => `<tr><td style="border: 1px solid #ddd; padding: 6px; text-align: center; color: red; width: 10%;">FALTA</td><td style="border: 1px solid #ddd; padding: 6px;">${a.nombre}</td><td style="border: 1px solid #ddd; padding: 6px; text-align: center; width: 10%;">${a.sexo}</td><td style="border: 1px solid #ddd; padding: 6px; text-align: center; width: 20%;">${a.nie}</td></tr>`).join('') : '<tr><td colspan="4" style="text-align: center; padding: 10px;">No hubo ausencias.</td></tr>'}
            </tbody>
        </table>
    </div>
  `;

  document.getElementById('pdf-content').innerHTML = pdfHtml;
  const opt = { 
    margin: 0, 
    filename: `Asistencia_${grado}_${fecha.replace(/\//g,'-')}.pdf`, 
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'letter', orientation: orientacion } 
  };

  try {
    await html2pdf().set(opt).from(document.getElementById('pdf-content')).save();
    // Guardar en la nube
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo_post: "asistencia", grado: grado, seccion: seccion, docente: docente, presentes: presentes.length, ausentes: ausentes.length, m: masc, f: fem }) });
  } catch (err) { alert("Error al generar PDF."); }
  finally { btn.disabled = false; btn.innerText = "📥 Generar Reporte PDF y Guardar en Nube"; }
}

function cerrarModal() { document.getElementById('modal-alumno').classList.remove('open'); }
async function guardarAlumno() {
  const n = { tipo_post: "alumno", grado: document.getElementById('grado-select').value, seccion: document.getElementById('seccion-select').value, nombre: document.getElementById('new-nombre').value, sexo: document.getElementById('new-sexo').value, nie: document.getElementById('new-nie').value };
  if(!n.nombre || !n.grado) return alert("Faltan datos");
  await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(n) });
  alert("Guardado."); cerrarModal(); inicializarBaseDatos();
}
</script>
</body>
</html>
