<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia — C.E. Cantón El Ojusthe - 80045</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root {
    --blue-800: #0C447C; --blue-600: #185FA5; --blue-50: #E6F1FB;
    --green-600: #1D9E75; --green-50: #EAF3DE;
    --red-600: #E24B4A; --red-50: #FCEBEB;
    --gray-900: #2C2C2A; --gray-600: #5F5E5A; --gray-100: #D3D1C7; --gray-50: #F0F2F5;
    --amber-600: #BA7517;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background-color: var(--gray-50); color: var(--gray-900); padding-bottom: 50px; }

  /* HEADER */
  .header { background-color: var(--blue-800); color: white; padding: 15px 20px; text-align: center; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .header-logo { width: 60px; height: 60px; background: white; border-radius: 50%; padding: 5px; }
  .header h1 { font-size: 18px; }
  
  .btn-group-nav { display: flex; gap: 8px; flex-direction: column; }
  .btn-nav { color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }

  .container { max-width: 850px; margin: 20px auto; padding: 0 20px; }
  .panel { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  
  .view-section { display: none; }
  .view-active { display: block; }

  /* FILTROS */
  .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  label { font-weight: bold; font-size: 12px; color: var(--gray-600); display: block; margin-bottom: 5px; text-transform: uppercase; }
  select, input[type="text"] { width: 100%; padding: 10px; border: 1.5px solid var(--gray-100); border-radius: 8px; outline: none; }
  
  /* TABLA WEB */
  .student-list { margin-top: 10px; border: 1px solid var(--gray-100); border-radius: 8px; overflow: hidden; }
  .student-row { display: grid; grid-template-columns: 40px 2fr 1fr 1fr; gap: 10px; padding: 12px 15px; border-bottom: 1px solid var(--gray-100); align-items: center; cursor: pointer; }
  .student-row:hover { background-color: var(--blue-50); }
  .student-header { background-color: var(--blue-800); color: white; font-weight: bold; font-size: 12px; }
  
  input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--green-600); }
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .badge.m { background-color: var(--blue-50); color: var(--blue-800); }
  .badge.f { background-color: #FDE8EF; color: #9D234C; }

  .btn-generate { background-color: var(--green-600); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
  .btn-generate:hover { background-color: #15805e; }

  .sub-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  .sub-table th, .sub-table td { padding: 10px; border: 1px solid var(--gray-100); text-align: left; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }

  /* ESTILO LOGO WEB */
  .web-logo-container { text-align: center; margin: 10px 0 20px 0; }
  .web-logo { width: 220px; height: auto; }

  /* CONTENEDOR PDF (OCULTO) */
  #pdf-container { display: none; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.jpg" alt="Logo" class="header-logo" onerror="this.style.display='none'"> 
  <div class="header-titles">
    <h1>Control de Asistencia Oficial</h1>
    <p>C.E. Cantón El Ojusthe - 80045</p>
  </div>
  <div class="btn-group-nav">
    <button class="btn-nav" style="background:#BA7517" onclick="pedirPasswordNuevo()">➕ Nuevo Alumno</button>
    <button class="btn-nav" style="background:var(--green-600)" onclick="pedirPasswordSub()">📊 Sub-Dirección</button>
    <button class="btn-nav" style="background:var(--blue-600); display:none;" id="btn-volver-asist" onclick="cambiarVista('docente')">✍️ Pasar Lista</button>
  </div>
</div>

<div class="container">
  
  <div id="view-docente" class="view-section view-active">
    <div class="panel">
      <div class="filters">
        <div>
          <label>Grado</label>
          <select id="grado-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value="7° Grado">7° Grado</option>
            <option value="8° Grado">8° Grado</option>
            <option value="9° Grado">9° Grado</option>
          </select>
        </div>
        <div>
          <label>Sección</label>
          <select id="seccion-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value='"A"'>"A"</option>
            <option value='"B"'>"B"</option>
            <option value="Única">Única</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
        <label style="color: var(--blue-800); margin:0; font-size:16px;">Lista de Estudiantes</label>
        <button onclick="toggleTodos()" style="background:none; border:none; color:var(--blue-600); cursor:pointer; font-size:12px; font-weight:bold; text-decoration: underline;">Marcar/Desmarcar Todos</button>
      </div>
      <div class="student-list" id="tabla-alumnos">
        <div style="padding: 20px; text-align: center; color: var(--gray-600);">Seleccione grado y sección para comenzar...</div>
      </div>
    </div>

    <div class="panel">
      <div class="web-logo-container">
        <img src="logo2.svg" alt="Logo Institucional" class="web-logo" onerror="this.src='logo2.jpg'; this.onerror=null;">
      </div>

      <label>Nombre del Docente Responsable:</label>
      <input type="text" id="docente-nombre" placeholder="Escriba su nombre completo" style="margin-bottom: 15px;">
      
      <div style="background: var(--gray-50); padding: 15px; border-radius: 8px; border: 1px solid var(--gray-100);">
        <label style="color: var(--green-600);">Opciones de Reporte PDF</label>
        <div style="display:flex; gap:20px; margin-bottom: 15px; font-size:14px;">
          <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="portrait" checked> Vertical</label>
          <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="landscape"> Horizontal</label>
        </div>
        <button class="btn-generate" id="btn-pdf-generate" onclick="generarPDF()">📥 Generar Reporte PDF Oficial</button>
      </div>
    </div>
  </div>

  <div id="view-subdireccion" class="view-section">
    <div class="panel">
      <h2 style="color: var(--blue-800); margin-bottom: 10px;">Registros en la Nube</h2>
      <div id="sub-lista-reportes"><div style="padding: 20px; text-align: center;">Cargando...</div></div>
      <button onclick="cargarReportesSub()" style="width:100%; margin-top:15px; padding:12px; border-radius:8px; border:1px solid var(--blue-600); color:var(--blue-600); background:white; font-weight:bold; cursor:pointer;">🔄 Actualizar Historial</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-alumno">
  <div class="modal">
    <h3>Registrar Estudiante</h3>
    <label>Nombre Completo</label>
    <input type="text" id="new-nombre" placeholder="Apellidos, Nombres" style="margin-bottom: 10px;">
    <label>Género</label>
    <select id="new-sexo" style="margin-bottom: 10px;"><option value="M">Masculino (M)</option><option value="F">Femenino (F)</option></select>
    <label>NIE</label>
    <input type="text" id="new-nie" placeholder="Número NIE" style="margin-bottom: 10px;">
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModal()" style="flex:1; padding:10px; border-radius: 8px; border: 1px solid #ddd;">Cancelar</button>
      <button onclick="guardarAlumno()" style="flex:1; padding:10px; background:var(--blue-600); color:white; border:none; border-radius:8px; font-weight: bold;">Guardar en Nube</button>
    </div>
  </div>
</div>

<div id="pdf-container">
  <div id="pdf-content" style="background: white; width: 100%; position: relative;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1OXGzPg4d0gQWTBxSyzDSi8_dVf8X7j3-bFcVK5EvoE0Auwj69KGUq2ZAU3r3Sofuxg/exec";

let baseDatosAlumnos = [];
let alumnosFiltrados = [];
let estadoSeleccion = true;

// --- NAVEGACIÓN Y SEGURIDAD ---
function pedirPasswordSub() { if (prompt("Contraseña Sub-Dirección:") === "1234") cambiarVista('subdireccion'); }
function pedirPasswordNuevo() { if (prompt("Contraseña Administrador:") === "1234") document.getElementById('modal-alumno').classList.add('open'); }

function cambiarVista(vista) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
    if(vista === 'subdireccion') {
        document.getElementById('view-subdireccion').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'block';
        cargarReportesSub();
    } else {
        document.getElementById('view-docente').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'none';
    }
}

// --- DATOS ---
async function inicializarBaseDatos() {
  try {
    const r = await fetch(SCRIPT_URL);
    baseDatosAlumnos = await r.json();
    baseDatosAlumnos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    cargarAlumnos();
  } catch (e) { alert("Error conectando a la nube."); }
}
window.onload = inicializarBaseDatos;

function cargarAlumnos() {
  const g = document.getElementById('grado-select').value;
  const s = document.getElementById('seccion-select').value;
  const cont = document.getElementById('tabla-alumnos');
  if (!g || !s) return;
  alumnosFiltrados = baseDatosAlumnos.filter(a => a.grado === g && a.seccion === s);
  
  if(alumnosFiltrados.length === 0) {
      cont.innerHTML = '<div style="padding:20px; text-align:center; color:red;">No hay alumnos en esta sección.</div>';
      return;
  }

  let html = `<div class="student-row student-header"><div>✓</div><div>Nombre del Estudiante</div><div>Sexo</div><div>NIE</div></div>`;
  alumnosFiltrados.forEach((a, i) => {
    html += `<div class="student-row" onclick="document.getElementById('chk-${i}').checked = !document.getElementById('chk-${i}').checked">
      <div class="checkbox-wrapper"><input type="checkbox" id="chk-${i}" checked onclick="event.stopPropagation()"></div>
      <div style="font-size:13px; font-weight:500;">${a.nombre}</div>
      <div><span class="badge ${a.sexo.toLowerCase()}">${a.sexo}</span></div>
      <div style="font-size:12px; color:#555;">${a.nie}</div></div>`;
  });
  cont.innerHTML = html;
}

function toggleTodos() {
    estadoSeleccion = !estadoSeleccion;
    alumnosFiltrados.forEach((a, i) => document.getElementById(`chk-${i}`).checked = estadoSeleccion);
}

// --- GENERADOR DE PDF PROFESIONAL ---
async function generarPDF() {
  const d = document.getElementById('docente-nombre').value.trim();
  const g = document.getElementById('grado-select').value;
  const s = document.getElementById('seccion-select').value;
  if (!g || !s || !d) { alert("Complete Docente, Grado y Sección."); return; }

  const btn = document.getElementById('btn-pdf-generate');
  btn.disabled = true; btn.innerText = "⏳ Procesando...";

  const pres = [], aus = []; let masc = 0, fem = 0;
  alumnosFiltrados.forEach((a, i) => {
    if (document.getElementById(`chk-${i}`).checked) { pres.push(a); a.sexo === 'M' ? masc++ : fem++; } 
    else aus.push(a);
  });

  const fecha = new Date().toLocaleDateString('es-ES');

  // HTML DEL PDF
  const pdfHtml = `
    <div style="padding: 40px; font-family: Arial, sans-serif; position: relative; min-height: 1000px;">
        
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.08; z-index: -1; width: 80%; text-align: center;">
            <img src="marca de agua.svg" style="width: 500px;" onerror="this.src='marca de agua.jpg'; this.onerror=null;">
        </div>

        <div style="text-align: center; margin-top: 150px; margin-bottom: 300px;">
            <h1 style="color: #0C447C; font-size: 28px; margin-bottom: 10px;">MINISTERIO DE EDUCACIÓN, CIENCIA Y TECNOLOGÍA</h1>
            <h2 style="color: #333; font-size: 22px; margin-bottom: 60px;">CENTRO ESCOLAR CANTÓN EL OJUSTHE - 80045</h2>
            
            <div style="border: 2px solid #0C447C; padding: 40px; border-radius: 15px; width: 85%; margin: 0 auto;">
                <h3 style="font-size: 24px; color: #185FA5; margin-bottom: 30px; border-bottom: 2px solid #185FA5; padding-bottom: 10px;">REGISTRO DE ASISTENCIA DIARIO</h3>
                <div style="text-align: left; font-size: 18px; line-height: 2;">
                    <p><strong>Grado:</strong> ${g} &nbsp;&nbsp;&nbsp; <strong>Sección:</strong> ${s}</p>
                    <p><strong>Docente Responsable:</strong> ${d}</p>
                    <p><strong>Fecha de Reporte:</strong> ${fecha}</p>
                </div>
            </div>
        </div>

        <div class="html2pdf__page-break"></div>

        <div style="border-bottom: 2px solid #0C447C; padding-bottom: 10px; margin-bottom: 20px; text-align: center;">
            <h2 style="font-size: 16px; color: #0C447C; margin:0;">REGISTRO DETALLADO - C.E. CANTÓN EL OJUSTHE</h2>
        </div>

        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; justify-content: space-between;">
            <span style="font-size: 14px;"><strong>Presentes:</strong> ${pres.length} (M: ${masc} | F: ${fem})</span>
            <span style="font-size: 14px;"><strong>Ausentes:</strong> ${aus.length}</span>
        </div>

        <h4 style="color: #1D9E75; border-bottom: 1px solid #1D9E75; padding-bottom: 5px; margin-bottom: 10px;">ESTUDIANTES PRESENTES</h4>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
            <thead>
                <tr style="background: #f2f2f2; font-size: 12px;">
                    <th style="border: 1px solid #ddd; padding: 8px; width: 10%;">ESTADO</th>
                    <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">NOMBRE COMPLETO</th>
                    <th style="border: 1px solid #ddd; padding: 8px; width: 10%;">SEXO</th>
                    <th style="border: 1px solid #ddd; padding: 8px; width: 20%;">NIE</th>
                </tr>
            </thead>
            <tbody style="font-size: 11px;">
                ${pres.map(a => `<tr>
                    <td style="border: 1px solid #ddd; padding: 6px; text-align:center; color:green; font-weight:bold;">✓</td>
                    <td style="border: 1px solid #ddd; padding: 6px;">${a.nombre}</td>
                    <td style="border: 1px solid #ddd; padding: 6px; text-align:center;">${a.sexo}</td>
                    <td style="border: 1px solid #ddd; padding: 6px; text-align:center;">${a.nie}</td>
                </tr>`).join('')}
            </tbody>
        </table>

        <h4 style="color: #E24B4A; border-bottom: 1px solid #E24B4A; padding-bottom: 5px; margin-bottom: 10px;">ESTUDIANTES AUSENTES</h4>
        <table style="width: 100%; border-collapse: collapse;">
            <tbody style="font-size: 11px;">
                ${aus.length > 0 ? aus.map(a => `<tr>
                    <td style="border: 1px solid #ddd; padding: 6px; text-align:center; color:red; font-weight:bold; width: 10%;">✗</td>
                    <td style="border: 1px solid #ddd; padding: 6px;">${a.nombre}</td>
                    <td style="border: 1px solid #ddd; padding: 6px; text-align:center; width: 10%;">${a.sexo}</td>
                    <td style="border: 1px solid #ddd; padding: 6px; text-align:center; width: 20%;">${a.nie}</td>
                </tr>`).join('') : '<tr><td colspan="4" style="text-align:center; padding:10px; border:1px solid #ddd;">Ninguna ausencia registrada</td></tr>'}
            </tbody>
        </table>
    </div>
  `;

  const container = document.getElementById('pdf-content');
  container.innerHTML = pdfHtml;

  const opt = {
    margin: 0,
    filename: `Asistencia_${g}_${fecha.replace(/\//g,'-')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'letter', orientation: document.querySelector('input[name="orientacion"]:checked').value }
  };

  html2pdf().set(opt).from(container).save().then(() => {
      btn.disabled = false; btn.innerText = "📥 Generar Reporte PDF Oficial";
      // Guardar registro en la nube
      fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo_post: "asistencia", grado: g, seccion: s, docente: d, presentes: pres.length, ausentes: aus.length, m: masc, f: fem }) });
  });
}

// --- OTROS ---
function cerrarModal() { document.getElementById('modal-alumno').classList.remove('open'); }
async function guardarAlumno() {
  const n = { tipo_post: "alumno", grado: document.getElementById('grado-select').value, seccion: document.getElementById('seccion-select').value, nombre: document.getElementById('new-nombre').value, sexo: document.getElementById('new-sexo').value, nie: document.getElementById('new-nie').value };
  if(!n.nombre || !n.grado) return alert("Faltan datos");
  await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(n) });
  alert("Estudiante guardado."); cerrarModal(); inicializarBaseDatos();
}

async function cargarReportesSub() {
    const container = document.getElementById('sub-lista-reportes');
    container.innerHTML = "Cargando...";
    try {
        const r = await fetch(SCRIPT_URL + "?tipo=reportes");
        const reportes = await r.json();
        let html = `<table class="sub-table"><tr style="background:var(--blue-800);color:white;"><th>Fecha</th><th>Grado/Secc</th><th>Docente</th><th>Aus</th><th>Total</th></tr>`;
        reportes.reverse().slice(0, 15).forEach(r => {
            html += `<tr><td>${new Date(r.fecha).toLocaleDateString()}</td><td>${r.grado} ${r.seccion}</td><td>${r.docente}</td><td style="color:red">${r.ausentes}</td><td style="color:green; font-weight:bold;">${r.presentes}</td></tr>`;
        });
        container.innerHTML = html + `</table>`;
    } catch (e) { container.innerHTML = "Error cargando reportes."; }
}
</script>
</body>
</html>
